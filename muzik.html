<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Alat Muzik</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, sans-serif;
}

.scan-text{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
color:white;
padding:10px 20px;
border-radius:10px;
z-index:999;
}

.back-btn{
position:fixed;
bottom:20px;
left:20px;
background:gold;
padding:10px 20px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
color:black;
z-index:999;
}

</style>

</head>

<body>

<div class="scan-text">
Scan marker alat muzik
</div>

<a href="index.html" class="back-btn">
← Kembali
</a>

<a-scene

mindar-image="imageTargetSrc: ./muzik.mind;"

embedded

vr-mode-ui="enabled: false"

device-orientation-permission-ui="enabled: false"

color-space="sRGB"

renderer="colorManagement: true; physicallyCorrectLights"

>

<a-camera position="0 0 0"></a-camera>

<!-- GONG -->

<a-entity mindar-image-target="targetIndex: 0">
</a-entity>

<!-- SULING -->

<a-entity mindar-image-target="targetIndex: 1">
</a-entity>

</a-scene>

<script>

/* GONG */

const gongTarget = document.querySelector('[mindar-image-target="targetIndex: 0"]');

gongTarget.addEventListener("targetFound", () => {

setTimeout(() => {

location.href =
"https://youtu.be/Fs3xR-ihuMU?si=_6ACmbEkSIfv24wq";

}, 1000);

});


/* SULING */

const sulingTarget = document.querySelector('[mindar-image-target="targetIndex: 1"]');

sulingTarget.addEventListener("targetFound", () => {

setTimeout(() => {

location.href =
"https://youtube.com/shorts/Mg7AtuLnDTo?si=6kAkv1ZXYn_EWfGK";

}, 1000);

});

</script>

</body>
</html>
