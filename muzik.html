<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
margin:0;
overflow:hidden;
}

</style>

</head>

<body>

<a-scene
mindar-image="imageTargetSrc: ./muzik.mind;"
embedded
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-assets>

<video
id="Gong-video"
src="./video/Gong.mp4"
muted
loop
autoplay
playsinline
webkit-playsinline>
</video>

</a-assets>

<a-camera position="0 0 0"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">

<a-video
src="#Gong-video"
width="1.5"
height="1"
position="0 0 0">
</a-video>

</a-entity>

</a-scene>

<script>

const video = document.querySelector("#Gong-video");

document
.querySelector('[mindar-image-target="targetIndex: 0"]')
.addEventListener("targetFound", () => {

video.play();

});

</script>

</body>
</html>
