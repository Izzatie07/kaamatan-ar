<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Alat Muzik Tradisional</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MINDAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* TEKS ARAHAN */

.scan-text{
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 25px;
    border-radius: 10px;
    z-index: 999;
    font-size: 18px;
    text-align: center;
}

/* BUTTON KEMBALI */

.back-btn{
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: gold;
    color: black;
    padding: 12px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    z-index: 999;
}

.back-btn:hover{
    background: orange;
}

</style>

</head>

<body>

<!-- ARAHAN -->

<div class="scan-text">
    Scan marker alat muzik untuk melihat video
</div>

<!-- BUTTON BACK -->

<a href="index.html" class="back-btn">
    ← Kembali
</a>

<!-- SCENE -->

<a-scene

mindar-image="imageTargetSrc: ./muzik.mind;"

embedded

color-space="sRGB"

renderer="colorManagement: true; physicallyCorrectLights"

vr-mode-ui="enabled: false"

device-orientation-permission-ui="enabled: false"

>

<!-- CAMERA -->

<a-camera position="0 0 0"></a-camera>

<!-- ========================= -->
<!-- MARKER GONG -->
<!-- ========================= -->

<a-entity mindar-image-target="targetIndex: 0">
</a-entity>

<!-- ========================= -->
<!-- MARKER SULING -->
<!-- ========================= -->

<a-entity mindar-image-target="targetIndex: 1">
</a-entity>

</a-scene>

<!-- SCRIPT -->

<script>

/* ELAK BUKA TAB BANYAK KALI */

let gongOpened = false;
let sulingOpened = false;

/* ========================= */
/* GONG */
/* ========================= */

document
.querySelector('[mindar-image-target="targetIndex: 0"]')
.addEventListener("targetFound", () => {

if(!gongOpened){

gongOpened = true;

window.open(
"https://www.youtube.com/shorts/Mg7AtuLnDTo?si=bx6bI1eyo-TJhw6F",
"_blank"
);

}

});

/* ========================= */
/* SULING */
/* ========================= */

document
.querySelector('[mindar-image-target="targetIndex: 1"]')
.addEventListener("targetFound", () => {

if(!sulingOpened){

sulingOpened = true;

window.open(
"https://youtu.be/Fs3xR-ihuMU?si=bm_42vB6D2ThNYiF",
"_blank"
);

}

});

</script>

</body>
</html>
