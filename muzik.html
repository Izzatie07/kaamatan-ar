<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Alat Muzik Tradisional</title>

<!-- AFRAME -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- MINDAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* ARAHAN SCAN */

.scan-text{
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 25px;
    border-radius: 10px;
    z-index: 999;
    font-size: 18px;
    text-align: center;
}

/* BUTTON BACK */

.back-btn{
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: gold;
    color: black;
    padding: 12px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    z-index: 999;
}

.back-btn:hover{
    background: orange;
}

</style>

</head>

<body>

<!-- ARAHAN -->

<div class="scan-text">
    Scan marker alat muzik untuk melihat video AR
</div>

<!-- BUTTON BACK -->

<a href="index.html" class="back-btn">
    ← Kembali
</a>

<!-- SCENE -->

<a-scene

mindar-image="imageTargetSrc: muzik.mind;"

embedded

color-space="sRGB"

renderer="colorManagement: true; physicallyCorrectLights"

vr-mode-ui="enabled: false"

device-orientation-permission-ui="enabled: false"

>

<!-- ASSETS -->

<a-assets>

<!-- VIDEO GONG -->

<video
id="gong-video"
src="Gong.mp4"
loop
crossorigin="anonymous"
webkit-playsinline
playsinline>
</video>

<!-- VIDEO SULING -->

<video
id="suling-video"
src="Sompoton.mp4"
loop
crossorigin="anonymous"
webkit-playsinline
playsinline>
</video>

</a-assets>

<!-- CAMERA -->

<a-camera
position="0 0 0"
look-controls="enabled: false">
</a-camera>

<!-- ========================= -->
<!-- MARKER GONG -->
<!-- ========================= -->

<a-entity mindar-image-target="targetIndex: 0">

<a-video
src="#gong-video"
width="1.6"
height="0.9"
position="0 0 0">
</a-video>

</a-entity>

<!-- ========================= -->
<!-- MARKER SULING -->
<!-- ========================= -->

<a-entity mindar-image-target="targetIndex: 1">

<a-video
src="#suling-video"
width="1.6"
height="0.9"
position="0 0 0">
</a-video>

</a-entity>

</a-scene>

<!-- SCRIPT -->

<script>

const gongVideo = document.querySelector("#gong-video");
const sulingVideo = document.querySelector("#suling-video");

/* GONG */

document
.querySelector('[mindar-image-target="targetIndex: 0"]')
.addEventListener("targetFound", () => {

    gongVideo.play();

});

/* SULING */

document
.querySelector('[mindar-image-target="targetIndex: 1"]')
.addEventListener("targetFound", () => {

    sulingVideo.play();

});

</script>

</body>
</html>
