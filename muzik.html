<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>AR Muzik</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial, sans-serif;
}

/* BUTTON VIDEO */

.video-btn{

display:none;

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

background:gold;

padding:15px 25px;

border-radius:10px;

font-size:20px;

font-weight:bold;

text-decoration:none;

color:black;

z-index:999;

}

.scan-text{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

background:rgba(0,0,0,0.7);

color:white;

padding:10px 20px;

border-radius:10px;

z-index:999;

}

</style>

</head>

<body>

<div class="scan-text">
Scan marker alat muzik
</div>

<!-- BUTTON VIDEO -->

<a
id="videoLink"
class="video-btn"
target="_blank">
Tonton Video
</a>

<a-scene
mindar-image="imageTargetSrc: ./muzik.mind;"
embedded
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false">

<a-camera position="0 0 0"></a-camera>

<!-- MARKER GONG -->

<a-entity mindar-image-target="targetIndex: 0">
</a-entity>

<!-- MARKER SULING -->

<a-entity mindar-image-target="targetIndex: 1">
</a-entity>

</a-scene>

<script>

const button = document.querySelector("#videoLink");

/* GONG */

const gongTarget = document.querySelector(
'[mindar-image-target="targetIndex: 0"]'
);

gongTarget.addEventListener("targetFound", () => {

button.style.display = "block";

button.href =
"https://youtu.be/Fs3xR-ihuMU?si=IjuKpcmePfWCyC-U";

});


/* SULING */

const sulingTarget = document.querySelector(
'[mindar-image-target="targetIndex: 1"]'
);

sulingTarget.addEventListener("targetFound", () => {

button.style.display = "block";

button.href =
"https://youtube.com/shorts/Mg7AtuLnDTo?si=sw0B86b5lxzKo7tk";

});

</script>

</body>

</html>
